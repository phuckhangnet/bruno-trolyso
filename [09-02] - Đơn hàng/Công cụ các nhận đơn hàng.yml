info:
  name: Công cụ các nhận đơn hàng
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/DonHang/XacNhanDonHang"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "DanhSachIdDonHang":[106],
          "LoaiXacNhan":"XAC_NHAN_DON_HANG" // XAC_NHAN_DON_HANG | HOAN_THANH_DON_HANG | XAC_NHAN_DA_GIAO_HANG
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
