info:
  name: Danh sách vị trí
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/QuyenHan/VaiTroNhanVien/LayDanhSachViTri"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: "{}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
