info:
  name: Danh sách quyền hạn theo màn hinh
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/QuyenHan/VaiTroNhanVien/LayDanhSachQuyenHan"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "MaManHinh":"notification_dashboard"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
