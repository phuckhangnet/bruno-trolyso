info:
  name: "[NhomHang]-Tạo mới danh mục nhớm hàng"
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/DanhMucNhomHang/TaoMoi"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "TenNhomHang":"Đồ uống",
          "GioiHanSoLuongSanPham": true// true | false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
