info:
  name: "[NhomHang]-Lấy danh sách nhóm hàng"
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/DanhMucNhomHang/LayDanhSachNhomHang"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
