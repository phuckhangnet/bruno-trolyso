info:
  name: Cập nhật dịch vụ
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/DichVuSanPham/CapNhatDichVu/1"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "TenDichVu":"Gói quà",
          "GiaTien":10000
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
