info:
  name: Lấy danh sách thông báo
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/ThongBao/NhanVien/LayDanhSachThongBao"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "PageSize":20,
          "PageNumber":1,
          "Type":"TAC_CA" // TAC_CA | DON_HANG    
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
