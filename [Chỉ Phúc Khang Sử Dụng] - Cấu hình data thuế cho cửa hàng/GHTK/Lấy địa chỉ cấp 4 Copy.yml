info:
  name: Lấy địa chỉ cấp 4 Copy
  type: http
  seq: 5

http:
  method: GET
  url: https://tinhthanhpho.com/api/v1/provinces?limit=100
  headers:
    - name: Token
      value: "{{ghtk_API_TOKEN}}"
    - name: X-Client-Source
      value: "{{ghtk_PARTNER_CODE}}"
    - name: Content-Type
      value: application/json
  params:
    - name: limit
      value: "100"
      type: query
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{tokenAPITinhThanh}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
