info:
  name: Lấy danh sách mã khuyến mãi
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/KhuyenMai/LayDanhSachMaKhuyenMai"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "SearchText":"",
          "PageIndex":1,
          "PageSize":10
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
