info:
  name: Lấy thông tin đơn hàng nháp
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/DonHangNhap/LayDanhSachDonHangNhap"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "TuNgay":"2026-01-01",
          "DenNgay":"2026-03-21"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
