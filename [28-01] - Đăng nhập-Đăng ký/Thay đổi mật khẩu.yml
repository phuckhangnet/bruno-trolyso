info:
  name: Thay đổi mật khẩu
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/Auth/Employee/ChangePassword"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: useIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "MatKhauCu":"751914",
          "MatKhauMoi":"123456"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Change pwd
    request:
      url: "{{url}}/Auth/Employee/ChangePassword"
      method: POST
      headers:
        - name: x-api-key
          value: "{{apiKey}}"
      body:
        type: json
        data: |-
          {
              "userId":12,
              "oldPassword":"123456",
              "newPassword":"123456"
          }
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Tue, 19 Nov 2024 10:13:30 GMT
        - name: Server
          value: Microsoft-IIS/10.0
        - name: Content-Encoding
          value: gzip
        - name: Transfer-Encoding
          value: chunked
        - name: Vary
          value: Accept-Encoding
        - name: Request-Context
          value: appId=cid-v1:7b29a27b-1ca8-4676-9588-932f5c4495e1
        - name: X-Powered-By
          value: ASP.NET
      body:
        type: json
        data: |-
          {
              "message": "Change password success",
              "metadata": {
                  "userId": 12
              },
              "statusCodes": 200
          }
