info:
  name: Decode
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/ForTest/Decode"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
  body:
    type: json
    data: |-
      {
          "databody": "",
          "Hash": "UyYP9DyQDitVHKdAKdY9lI0UynHuiod6sy11rafR5EI="
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
         console.log(jsonData.Token)
         bru.setEnvVar('token',jsonData.AccessToken);
         bru.setEnvVar('userIdLogin',jsonData.UserInfo.IDNguoiDung);
        bru.setEnvVar('idCuaHang', jsonData.UserInfo.IDCuaHang);
        // // pm.environment.set("token", jsonData.Token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
