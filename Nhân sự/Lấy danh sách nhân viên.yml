info:
  name: Lấy danh sách nhân viên
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/Employee/GetListEmployee"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "SearchText": "",
          "PageNumber": 1,
          "PageSize": 10,
          "IsLock": true // true | false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
