info:
  name: Báo cáo đơn hàng theo trạng thái vận chuyển
  type: http
  seq: 8

http:
  method: POST
  url: "{{url}}/BaoCao/BaoCaoChiTietDonHangVanChuyenTheoNgay"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "tuNgay": "2026-01-13",
          "denNgay": "2026-12-14",
          "top": 10
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
