info:
  name: Báo cáo đơn hàng
  type: http
  seq: 7

http:
  method: POST
  url: "{{url}}/BaoCao/BaoCaoDonHangTheoNgay"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |
      {
        "tuNgay": "2026-01-01",
        "denNgay": "2026-12-31"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
