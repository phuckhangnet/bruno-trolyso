info:
  name: Báo cáo chi phí theo ngày
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/BaoCao/BaoCaoChiPhiCuaHangTheoNgay"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
  body:
    type: json
    data: |-
      {
        "tuNgay": "2026-01-01",
        "denNgay": "2026-12-31"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
