info:
  name: Lấy danh sách khách hàng
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/KhachHang/GuiThongBao/LayDanhSachKhachHang"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "SearchText": "",
          "PageNumber": 1,
          "PageSize": 10,
          "BirthdayFilter": "this_month", // "today", "this_week", "this_month"
          //"RevenueRange": "<5M", // "<5M", "5M-10M", ">10M", ">20M", ">50M", ">150M",
         // "OrderCountRange": "<5" // "<5", "5-10", ">10", ">20", "<=50", ">150"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
