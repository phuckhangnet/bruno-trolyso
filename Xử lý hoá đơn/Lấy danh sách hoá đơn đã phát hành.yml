info:
  name: Lấy danh sách hoá đơn đã phát hành
  type: http
  seq: 6

http:
  method: POST
  url: "{{url}}/DataManagement/GetPublishedInvoices"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "Type": "TAC_CA", // TAC_CA | KHACH_HANG_YEU_CAU | CUA_HANG_YEU_CAU,
          "FromDate": "2026-01-01",
          "ToDate": "2026-12-30",
          "PageSize": 10,
          "PageNumber": 1 
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
