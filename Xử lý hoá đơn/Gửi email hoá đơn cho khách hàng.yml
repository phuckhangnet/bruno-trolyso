info:
  name: Gửi email hoá đơn cho khách hàng
  type: http
  seq: 8

http:
  method: POST
  url: "{{url}}/DataManagement/SendInvoiceEmailToCustomer"
  headers:
    - name: x-api-key
      value: "{{apiKey}}"
    - name: userIdLogin
      value: "{{userIdLogin}}"
    - name: idCuaHang
      value: "{{idCuaHang}}"
  body:
    type: json
    data: |-
      {
          "IdHoaDon": 15
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
